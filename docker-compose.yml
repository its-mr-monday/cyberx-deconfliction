services:
  postgres:
    image: postgres:15-alpine
    container_name: deconfliction_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deconfliction}
      POSTGRES_USER: ${POSTGRES_USER:-deconfliction}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - deconfliction_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deconfliction}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: deconfliction_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-deconfliction}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-deconfliction}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      FLASK_ENV: ${FLASK_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app

  webapp:
    build: ./webapp
    container_name: deconfliction_webapp
    environment:
      VITE_API_URL: ${API_URL:-}
    depends_on:
      - api
    volumes:
      - ./webapp:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    container_name: deconfliction_nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ${NGINX_CONF:-./nginx/nginx.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_DIR:-/dev/null}:/etc/nginx/certs:ro
    depends_on:
      - api
      - webapp

volumes:
  deconfliction_pgdata:
